name: Update CLI Model Data

on:
  schedule:
    - cron: "0 6 * * 1" # Every Monday at 6 AM UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  update-models:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/cli
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Run model data update script
        run: npx tsx scripts/update-models.ts

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet data/models.json; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        if: steps.changes.outputs.changed == 'true'
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "chore(cli): update model pricing and capabilities"
          title: "chore(cli): weekly model data update"
          body: |
            Automated weekly update of LLM model data:
            - Pricing changes
            - New model additions
            - Capability updates

            Auto-generated by GitHub Actions.
          branch: chore/update-cli-model-data
          base: main
