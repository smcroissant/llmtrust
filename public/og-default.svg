<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0f"/>
      <stop offset="100%" style="stop-color:#1a1025"/>
    </linearGradient>
    <linearGradient id="brand" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Decorative circles -->
  <circle cx="1000" cy="150" r="200" fill="#8b5cf6" opacity="0.08"/>
  <circle cx="200" cy="500" r="180" fill="#06b6d4" opacity="0.06"/>
  <!-- Logo text -->
  <text x="600" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="800" fill="url(#brand)" text-anchor="middle">LLM Trust</text>
  <!-- Tagline -->
  <text x="600" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="32" font-weight="400" fill="#94a3b8" text-anchor="middle">Discover &amp; Run Open-Source LLMs Locally</text>
  <!-- Sub info -->
  <text x="600" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="400" fill="#64748b" text-anchor="middle">Compare benchmarks • Browse models • Run locally</text>
  <!-- Bottom accent line -->
  <rect x="400" y="470" width="400" height="3" rx="2" fill="url(#brand)" opacity="0.6"/>
</svg>